<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tesorería</title>
  <style>
    :root {
        --verde-uis: #06394b; /* Verde UIS */
        --blanco: #ffffff;
        --dorado-uis: #C8B18B; /* Dorado UIS */
        --fondo-contenedor: rgba(0, 0, 0, 0.2);
    }
    body {
        background: var(--verde-uis);
        color: var(--blanco);
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 20px;
    }
    .container {
        max-width: 600px;
        margin: auto;
        background: var(--fondo-contenedor);
        padding: 20px;
        border-radius: 10px;
    }
    img {
        filter: drop-shadow(0px 4px 6px rgba(0, 0, 0, 0.8));
    }
    h1 {
        font-family: "Times New Roman", serif;
        font-size: 48px;
        color: var(--dorado-uis);
        margin-bottom: 30px;
        text-shadow: 2px 4px 6px rgba(0, 0, 0, 0.6);
    }
    .button {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        width: 100%;
        max-width: 250px;
        margin: 30px auto;
        padding: 12px;
        background: var(--dorado-uis);
        color: var(--verde-uis);
        text-decoration: none;
        font-size: 18px;
        font-weight: bold;
        border: none;
        border-radius: 5px;
        transition: 0.3s;
        box-shadow: 0 6px 6px rgba(0, 0, 0, 0.6);
    }
    .button:hover {
        background: #b8a17b;
    }
    .button img {
        width: 35px;
        height: 35px;
        margin: 0 3px 0 3px;
        filter: drop-shadow(0px 4px 6px rgba(0, 0, 0, 0.8));
    }
    .button span {
        flex: 1;
        text-align: center;
    }
  </style>
</head>
<body>
  <h1>TESORERÍA</h1>
  <div class="container">
    <a class="button" href="https://docs.google.com/spreadsheets/d/1YFEnaW75GwAENCf4xRy_BM-itGZzX6aOK1tGnWOfCrU/edit?gid=0#gid=0">
      <img src="https://i.ibb.co/5xSVRSFP/image-removebg-preview-1.png" alt="General" />
      <span>General</span>
    </a>
    <a class="button" href="https://docs.google.com/spreadsheets/d/1FgJXM_R4zXTsxtgBYtPeluljILLJ1ifeKUaUv7fMRWE/edit?gid=0#gid=0">
      <img src="https://i.ibb.co/P3RFSx8/image-removebg-preview-2.png" alt="Individual" />
      <span>Individual</span>
    </a>
    <a class="button" href="https://docs.google.com/spreadsheets/d/1FALWb6yUjTnTlc5-5eq6TcmRyxcSs5dagG7HHkSOAaw/edit?gid=0#gid=0">
      <img src="https://i.ibb.co/C3Nn6g0F/image-removebg-preview.png" alt="Cooperativa" />
      <span>Cooperativa</span>
    </a>
    <a class="button" href="https://docs.google.com/spreadsheets/d/1NZlgTVzEE0oek_bt749pa8j42_uKs9a9LWabgmhJ5vc/edit?gid=0#gid=0">
      <img src="https://i.ibb.co/v0PWd3V/images-removebg-preview.png" alt="Formato Cooperativa" />
      <span>Formato Cooperativa</span>
    </a>
  </div>
</body>
</html>
